[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "naqafin-caption-worker"
version = "0.1.0"
description = "Optional CUDA caption worker for Jellyfin auto-generated captions."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111,<1",
    "faster-whisper>=1.1,<2",
    "deepmultilingualpunctuation>=1.0,<2",
    "transformers>=4.30,<5",
    "python-multipart>=0.0.9,<1",
    "pydantic-settings>=2.3,<3",
    "uvicorn[standard]>=0.30,<1",
]

[project.optional-dependencies]
dev = [
    "httpx>=0.27,<1",
    "pytest>=8,<9",
    "ruff>=0.5,<1",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
